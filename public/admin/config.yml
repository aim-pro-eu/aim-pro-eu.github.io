#backend:
#  name: git-gateway
#  branch: main
backend:
  name: github
  repo: aim-pro-eu/aim-pro-eu.github.io
  branch: main
  base_url: https://decap-proxy.olivier-barais.workers.dev
  auth_endpoint: /auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # Collection for single sections of the One-Page
  - name: "sections"
    label: "Page Sections"
    files:
      - name: "hero"
        label: "Hero (Top of Page)"
        file: "src/content/sections/hero.md"
        fields:
          - {label: "Project Title", name: "title", widget: "string"}
          - {label: "Acronym", name: "acronym", widget: "string"}
          - {label: "Background Image", name: "image", widget: "image"}
          - {label: "Short Summary", name: "body", widget: "markdown"}

      - name: "about"
        label: "About (Summary)"
        file: "src/content/sections/about.md"
        fields:
          - {label: "Title", name: "title", widget: "string", default: "Project Summary"}
          - {label: "Content", name: "body", widget: "markdown"}
          # Here we will put the text "In the era of digital transformation..." from the PDF

      - name: "objectives"
        label: "Specific Objectives"
        file: "src/content/sections/objectives.md"
        fields:
          - {label: "Title", name: "title", widget: "string", default: "Specific Objectives"}
          - {label: "Introduction", name: "intro", widget: "text"}
          - label: "Objectives List"
            name: "objectives_list"
            widget: "list"
            fields:
              - {label: "Code (e.g., SO1)", name: "code", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

      - name: "publications"
        label: "Publications Page"
        file: "src/content/sections/publications.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string", default: "Publications & Resources"}
          - {label: "Introduction", name: "intro", widget: "text"}

          - label: "Project Deliverables (PDFs)"
            name: "deliverables"
            widget: "list"
            fields:
              - {label: "Code (e.g., D1.1)", name: "code", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Short Description", name: "description", widget: "text", required: false}
              - {label: "Date", name: "date", widget: "string", required: false}
              - {label: "PDF File", name: "file", widget: "file"}

          - label: "Scientific Publications (External Links)"
            name: "scientific_papers"
            widget: "list"
            fields:
              - {label: "Article Title", name: "title", widget: "string"}
              - {label: "Authors", name: "authors", widget: "string"}
              - {label: "Publisher/Conference", name: "publisher", widget: "string"}
              - {label: "Year", name: "year", widget: "string"}
              - {label: "Link to Article", name: "link", widget: "string"}

  # Collection for Partners (Based on UDA, FBK, UNIPI list...)
  - name: "partners"
    label: "Partners"
    folder: "src/content/partners"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Short Name (Acronym)", name: "shortname", widget: "string"} # e.g., UDA
      - {label: "Full Name", name: "fullname", widget: "string"} # e.g., Università degli Studi dell'Aquila
      - {label: "Country", name: "country", widget: "select", options: ["Italy", "Spain", "Germany", "Sweden", "Netherlands", "Slovenia", "Greece", "France", "Belgium", "Switzerland"]}
      - {label: "Role", name: "role", widget: "select", options: ["Coordinator", "Beneficiary", "Associated Partner"]}
      - {label: "Logo", name: "logo", widget: "image"}
      - {label: "Website", name: "website", widget: "string", required: false}

  # Collection for Work Packages
  - name: "workpackages"
    label: "Work Packages"
    folder: "src/content/workpackages"
    create: true
    fields:
      - {label: "Number (e.g., WP1)", name: "wp_number", widget: "string"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Leader", name: "leader", widget: "string"}
      - {label: "Start/End Month", name: "timing", widget: "string"} # e.g., M1-M36

 # New Blog Collection
  - name: "blog"
    label: "Blog & News"
    folder: "src/content/blog"
    create: true
    extension: "mdx"       # <--- Important: force MDX extension
    format: "frontmatter"  # <--- Important for Decap to handle YAML + content
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publication Date", name: "pubDate", widget: "datetime"}
      - {label: "Short Description", name: "description", widget: "text"}
      - {label: "Author", name: "author", widget: "string", default: "AIM-PRO Team"}
      - {label: "Cover Image", name: "image", widget: "image", required: false}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Content", name: "body", widget: "markdown"}


  - name: "newsletters"
    label: "Newsletters"
    folder: "src/content/newsletters"
    create: true
    slug: "{{year}}-{{month}}-newsletter"
    fields:
      - {label: "Newsletter Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Main Image", name: "coverImage", widget: "image", required: false}
      - {label: "Newsletter Content", name: "body", widget: "markdown"}
      - label: "Social Media Review (Optional)"
        name: "linkedinPosts"
        widget: "list"
        fields:
          - {label: "Author", name: "author", widget: "string"}
          - {label: "Summary", name: "summary", widget: "string"}
          - {label: "Link", name: "postUrl", widget: "string"}
          - {label: "Image", name: "image", widget: "image"}

  - name: "privacy"
    label: "Legal & Privacy Policy"
    files:
      - name: "privacy-policy"
        label: "Privacy Policy"
        file: "src/content/privacy-policy/index.md"
        fields:
            - { label: "Title", name: "title", widget: "string" }
            - { label: "Last Updated", name: "date", widget: "datetime" }
            - { label: "Body Content", name: "body", widget: "markdown" }